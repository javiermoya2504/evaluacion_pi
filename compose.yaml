name: evaluacion-pi

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: evaluacion-pi-frontend:local
    env_file:
      - path: .env.local
        required: false
    environment:
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/login"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: evaluacion-pi-backend:local
    env_file:
      - path: .env.local
        required: false
    environment:
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/auth/providers"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
